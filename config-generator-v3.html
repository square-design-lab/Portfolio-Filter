    <script>
      try {
        const TAGS = ['Branding', 'Architecture', 'Interiors', 'Photography']
        const LOCATIONS = ['Miami', 'Austin', 'NYC', 'LA']
        const YEARS = [2022, 2023, 2024, 2025]
        const AUTHORS = ['Alex Kim','Jordan Lee','Taylor Morgan','Riley Chen']
        const CLIENTS = ['Google', 'Apple', 'Nike', 'Tesla']

        let config = {}
        const DATA = Array.from({ length: 60 }, (_, i) => {
          const meta = {
            Location: LOCATIONS[i % LOCATIONS.length],
            Year: YEARS[i % YEARS.length],
            Author: AUTHORS[i % AUTHORS.length],
            Client: CLIENTS[i % CLIENTS.length]
          }
          return {
            id: i,
            title: `Project ${i + 1}`,
            tags: [TAGS[i % TAGS.length], TAGS[(i + 1) % TAGS.length]],
            location: meta.Location,
            year: meta.Year,
            excerpt: `Sample excerpt for Project ${i + 1}. Lorem ipsum dolor sit amet, consectetur adipiscing elit.`,
            author: meta.Author,
            client: meta.Client,
            meta
          }
        })

        let state = {
          page: 1,
          filters: { tags: [], location: [], year: [] },
          search: '',
          sort: 'original'
        }

        /* --- UI HELPERS --- */
        function prepareMockWrapper(el) {
          if (!el || el.dataset.mockWrapperReady === '1') return
          el.classList.add('pf-wrapper-prep')
          el.dataset.mockWrapperReady = '1'
          void el.offsetHeight
          requestAnimationFrame(() => {
            el.classList.add('pf-wrapper-ready')
            el.classList.remove('pf-wrapper-prep')
          })
        }

        function replayMockAnimations(gridEl, items, animMode, staggerOn) {
          if (!gridEl || !items || !items.length) return
          if (animMode === 'none') return

          const delayStep = staggerOn === false ? 0 : 60
          const baseTransform = animMode === 'zoom' ? 'scale(0.97)' : (animMode === 'fade-up' ? 'translateY(10px)' : 'none')

          items.forEach((el, idx) => {
            el.classList.remove('pf-anim-visible', 'is-visible')
            el.style.transition = 'none'
            el.style.opacity = '0'
            el.style.transform = baseTransform
            el.style.setProperty('--mock-anim-delay', `0ms`)
          })

          void gridEl.offsetHeight

          requestAnimationFrame(() => {
            items.forEach((el, idx) => {
              const delay = staggerOn === false ? 0 : idx * delayStep
              el.style.transition = ''
              el.style.opacity = ''
              el.style.transform = ''
              el.style.setProperty('--mock-anim-delay', `${delay}ms`)
              el.classList.add('pf-anim-visible', 'is-visible')
            })
          })
        }

        let sortInitialized = false
        let groupOpenState = {}
        let lastLayout = null
        let lastFilterLayout = null
        let lastMobileBehavior = null
        let lastMobileDisplayStyle = null
        let forceMobileCheckbox = false
        let previewRandomMap = null
        let lastRandomEnabled = false

        function getOptionsFromData(key) {
          const values = new Set()
          DATA.forEach(item => {
            if (Array.isArray(item[key])) item[key].forEach(v => values.add(v))
            else if (item[key] !== undefined && item[key] !== null) values.add(item[key])
          })
          return Array.from(values)
        }

        function getOptionCount(key, value) {
          let count = 0
          DATA.forEach(item => {
            const itemVal = item[key]
            if (Array.isArray(itemVal)) {
              if (itemVal.includes(value)) count += 1
            } else if (itemVal === value) {
              count += 1
            }
          })
          return count
        }

        function parseCustomFieldList(raw) {
          return (raw || '').split(',').map(v => v.trim()).filter(Boolean)
        }

        function mapMetaLayoutClass(layout) {
          const raw = (layout || 'stacked-above').toLowerCase()
          if (raw === 'stacked-above') return 'meta-layout-stacked-above'
          if (raw === 'split') return 'meta-layout-split'
          if (raw === 'overlay-top-left') return 'meta-layout-overlay-top-left'
          if (raw === 'overlay-top-right') return 'meta-layout-overlay-top-right'
          return 'meta-layout-stacked-below'
        }

        function sanitizeKeyForClass(key) {
          return key.toLowerCase().replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-')
        }

        function clampPercent(value) {
          const num = Number(value)
          if (Number.isNaN(num)) return null
          return Math.min(90, Math.max(10, num))
        }

        function getMetaValue(item, keyName) {
          if (!keyName) return null
          const lower = keyName.toLowerCase()
          const metaObj = item.meta || {}
          const matchKey = Object.keys(metaObj).find(k => k.toLowerCase() === lower)
          if (matchKey) return metaObj[matchKey]
          if (lower === 'location') return item.location
          if (lower === 'year') return item.year
          if (lower === 'author') return item.author
          if (lower === 'client') return item.client
          return null
        }

        function shuffleArray(arr) {
          const copy = [...arr]
          for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1))
            ;[copy[i], copy[j]] = [copy[j], copy[i]]
          }
          return copy
        }

        function resolveTagDelimiter(mode, custom) {
          if (mode === 'comma') return ', '
          if (mode === 'pipe') return ' | '
          if (mode === 'slash') return ' / '
          if (mode === 'dot') return ' • '
          if (mode === 'custom') return custom || ' '
          return ' '
        }

        function toggleFilter(key, value) {
          if (value === 'ALL_KEY') {
             state.filters[key] = []
          } else {
             const current = Array.isArray(state.filters[key]) ? [...state.filters[key]] : []
             const idx = current.indexOf(value)
             if (config.allowMultiSelect) {
                if (idx >= 0) current.splice(idx, 1)
                else current.push(value)
             } else {
                if (idx >= 0) current.splice(idx, 1)
                else { current.length = 0; current.push(value) }
             }
             state.filters[key] = current
          }
          state.page = 1
          renderMock()
        }

        function resetFilters() {
          state.filters = { tags: [], location: [], year: [] }
          state.search = ''
          state.sort = config.defaultSortOrder || 'original'
          state.page = 1
          const s = document.getElementById('mockSearchInput')
          if (s) s.value = ''
          renderMock()
        }

        function closeMockDropdown(group) {
          if (!group) return
          group.classList.remove('open')
          const header = group.querySelector('.mock-dropdown-header')
          const optsDiv = group.querySelector('.mock-dropdown-content')
          if (header) header.setAttribute('aria-expanded', 'false')
          if (optsDiv) {
            optsDiv.setAttribute('aria-hidden', 'true')
            optsDiv.style.maxHeight = 0
            optsDiv.style.opacity = 0
          }
          if (group.dataset.groupKey) groupOpenState[group.dataset.groupKey] = false
        }

        function closeOtherOpenMenus(currentGroup) {
          if (!currentGroup) return
          const isMobilePreview = document.getElementById('previewFrame')?.classList.contains('mobile')
          const useCheckboxDropdown = config.filterLayout === 'checkbox' && config.layout === 'top'
          const isDropdown = config.filterLayout === 'dropdown' || useCheckboxDropdown
          if (isMobilePreview || config.layout !== 'top' || !isDropdown) return
          const groups = document.querySelectorAll('.mock-controls-left .mock-filter-group.open')
          groups.forEach(group => {
            if (group === currentGroup) return
            closeMockDropdown(group)
          })
        }

        /* --- MOCK RENDERER --- */
        function renderFilterGroup(label, options, key, displayLabel, orderIndex) {
          if (!options || options.length === 0) return null
          if (!config.multipleFilterGroups && key !== 'tags') return null

          const group = document.createElement('div')
          group.className = 'mock-filter-group'

          const layout = config.layout || 'sidebar'
          const isMobilePreview = document.getElementById('previewFrame')?.classList.contains('mobile')
          const mobileDisplayMode = config.mobile?.displayStyle || 'chips'
          const mobileBehavior = config.mobile?.behavior || 'none'
          const isAccordion = mobileBehavior === 'accordion' && isMobilePreview
          const mobileCheckboxMode = isMobilePreview && (mobileBehavior === 'checkbox' || mobileDisplayMode === 'checkbox')
          const effectiveMobileStyle = mobileCheckboxMode ? 'checkbox' : mobileDisplayMode
          const useCheckboxDropdown = config.filterLayout === 'checkbox' && layout === 'top'
          const isDropdown = config.filterLayout === 'dropdown' || useCheckboxDropdown
          const forceLabelForLayout = config.filterLayout !== 'inline'
          const shouldShowLabel = forceLabelForLayout || config.showFilterLabel || isAccordion
          const isChipRow = isMobilePreview && effectiveMobileStyle === 'chips' && !isDropdown

          if (isAccordion) group.classList.add('accordion')
          if (isChipRow) group.classList.add('chip-row')

          group.style.marginBottom = (config.styles.marginBottom || 0) + 'px'
          group.dataset.groupKey = key

          const hasPersisted = typeof groupOpenState[key] === 'boolean'
          const defaultOpen = isDropdown && layout === 'sidebar' && !isMobilePreview && orderIndex === 0
          const startOpen = hasPersisted ? groupOpenState[key] : (isAccordion ? false : defaultOpen)

          if (startOpen) group.classList.add('open')
          groupOpenState[key] = startOpen

          const renderedLabel = displayLabel || label

          /* Truncation */
          const applyMockTruncation = container => {
            if (!config.truncateFilters || !container) return
            const maxVisible = Math.max(parseInt(config.truncateMax, 10) || 0, 0)
            const optionNodes = Array.from(container.children).filter(node => node.classList.contains('mock-option'))
            if (optionNodes.length <= maxVisible) return
            const hidden = optionNodes.slice(maxVisible)
            const hiddenWrap = document.createElement('div')
            hiddenWrap.className = 'mock-truncate-hidden'
            hiddenWrap.style.height = '0px'
            hiddenWrap.style.overflow = 'hidden'
            hiddenWrap.setAttribute('aria-hidden', 'true')
            hidden.forEach(node => hiddenWrap.appendChild(node))

            const toggle = document.createElement('button')
            toggle.type = 'button'
            toggle.className = 'mock-truncate-toggle'
            toggle.textContent = config.textLabels.showMore || 'Show more'
            toggle.setAttribute('aria-expanded', 'false')

            const setExpanded = expanded => {
                const startHeight = hiddenWrap.offsetHeight
                const targetHeight = expanded ? hiddenWrap.scrollHeight : 0
                hiddenWrap.style.height = `${startHeight}px`
                hiddenWrap.setAttribute('aria-hidden', expanded ? 'false' : 'true')
                toggle.textContent = expanded ? config.textLabels.showLess || 'Show less' : config.textLabels.showMore || 'Show more'
                toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false')
                requestAnimationFrame(() => { hiddenWrap.style.height = `${targetHeight}px` })
                const tidy = () => {
                    if (expanded) hiddenWrap.style.height = 'auto'
                    hiddenWrap.removeEventListener('transitionend', tidy)
                }
                hiddenWrap.addEventListener('transitionend', tidy)
            }
            toggle.onclick = () => setExpanded(toggle.getAttribute('aria-expanded') !== 'true')
            container.appendChild(hiddenWrap)
            container.appendChild(toggle)
          }

          /* "All" Button Logic */
          const allBtn = createFilterControl(config.textLabels.allText, key, true)

          if (isDropdown) {
            const head = document.createElement('div')
            head.className = 'mock-dropdown-header' + (!shouldShowLabel ? ' hide-label' : '')
            head.setAttribute('role', 'button')
            head.innerHTML = `${shouldShowLabel ? renderedLabel : ''} <svg class="mock-caret" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path></svg>`
            const optsDiv = document.createElement('div')
            optsDiv.className = 'mock-dropdown-content'
            optsDiv.style.gap = config.styles.gap + 'px'
            optsDiv.setAttribute('aria-hidden', startOpen ? 'false' : 'true')
            const toggle = () => {
                const willOpen = !group.classList.contains('open')
                if (willOpen) closeOtherOpenMenus(group)
                group.classList.toggle('open')
                const isOpen = group.classList.contains('open')
                head.setAttribute('aria-expanded', isOpen ? 'true' : 'false')
                optsDiv.setAttribute('aria-hidden', isOpen ? 'false' : 'true')
                if (isOpen) {
                    optsDiv.style.maxHeight = optsDiv.scrollHeight + "px";
                    optsDiv.style.opacity = 1;
                } else {
                    optsDiv.style.maxHeight = 0;
                    optsDiv.style.opacity = 0;
                }
                groupOpenState[key] = isOpen
            }
            head.onclick = toggle
            group.appendChild(head)
            optsDiv.appendChild(allBtn)
            options.forEach(opt => optsDiv.appendChild(createFilterControl(opt, key)))
            applyMockTruncation(optsDiv)
            group.appendChild(optsDiv)
            if (isAccordion && startOpen) { requestAnimationFrame(() => { optsDiv.style.maxHeight = `${optsDiv.scrollHeight}px`; optsDiv.style.opacity = 1; }) }
          } else {
            let accordionOptsDiv = null
            if (shouldShowLabel) {
              const head = document.createElement('div')
              head.className = 'mock-filter-header'
              head.innerHTML = `${renderedLabel}${isAccordion ? ' <svg class="mock-caret" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path></svg>' : ''}`
              if (isAccordion) {
                head.setAttribute('role', 'button')
                head.onclick = () => {
                  group.classList.toggle('open')
                  const isOpen = group.classList.contains('open')
                  head.setAttribute('aria-expanded', isOpen ? 'true' : 'false')
                  if (accordionOptsDiv) {
                      accordionOptsDiv.setAttribute('aria-hidden', isOpen ? 'false' : 'true')
                      accordionOptsDiv.style.maxHeight = isOpen ? `${accordionOptsDiv.scrollHeight}px` : '0px'
                      accordionOptsDiv.style.opacity = isOpen ? 1 : 0
                  }
                  groupOpenState[key] = isOpen
                }
              }
              group.appendChild(head)
            }
            const optsDiv = document.createElement('div')
            optsDiv.className = 'mock-options'
            accordionOptsDiv = optsDiv
            if (isAccordion) {
              optsDiv.setAttribute('aria-hidden', startOpen ? 'false' : 'true')
              optsDiv.style.maxHeight = startOpen ? `${optsDiv.scrollHeight}px` : '0px'
              optsDiv.style.opacity = startOpen ? 1 : 0
            }
            optsDiv.style.justifyContent = config.styles.align === 'center' ? 'center' : (config.styles.align === 'right' ? 'flex-end' : 'flex-start')
            optsDiv.style.gap = config.styles.gap + 'px'

            if (isMobilePreview) {
              if (effectiveMobileStyle === 'chips') {
                optsDiv.style.flexWrap = 'nowrap'; optsDiv.style.overflowX = 'auto';
              } else {
                optsDiv.style.flexWrap = 'wrap'; optsDiv.style.overflow = 'visible';
              }
              if (mobileCheckboxMode) {
                optsDiv.style.flexDirection = 'column'; optsDiv.style.alignItems = 'flex-start'; optsDiv.style.flexWrap = 'nowrap';
              }
            } else {
              optsDiv.style.flexWrap = 'wrap'
            }

            optsDiv.appendChild(allBtn)
            options.forEach(opt => optsDiv.appendChild(createFilterControl(opt, key)))
            group.appendChild(optsDiv)
            applyMockTruncation(optsDiv)
            if (isAccordion && startOpen) { requestAnimationFrame(() => { optsDiv.style.maxHeight = `${optsDiv.scrollHeight}px` }) }
          }
          return group
        }

        function createFilterControl(opt, key, isAll = false) {
          const selected = Array.isArray(state.filters[key]) ? state.filters[key] : []
          const isActive = isAll ? selected.length === 0 : selected.includes(opt)
          let el
          const labelText = String(opt)
          const showCounts = !!config.showItemCounts && !isAll
          const countValue = showCounts ? getOptionCount(key, opt) : null

          const isMobilePreview = document.getElementById('previewFrame')?.classList.contains('mobile')
          const mobileDisplayMode = config.mobile?.displayStyle || 'chips'
          const mobileBehavior = config.mobile?.behavior || 'none'
          const mobileCheckboxMode = isMobilePreview && (mobileBehavior === 'checkbox' || mobileDisplayMode === 'checkbox')
          const useCheckbox = config.filterLayout === 'checkbox' || mobileCheckboxMode

          if (useCheckbox) {
            const label = document.createElement('label')
            label.className = 'mock-label-check mock-option'
            const chk = document.createElement('input')
            chk.type = 'checkbox'
            chk.checked = isActive
            chk.onchange = () => toggleFilter(key, isAll ? 'ALL_KEY' : opt)
            label.appendChild(chk)
            label.appendChild(document.createTextNode(labelText))
            if (showCounts) {
              const countEl = document.createElement('span')
              countEl.className = 'mock-count'
              countEl.textContent = `(${countValue})`
              label.appendChild(countEl)
            }
            el = label
          } else {
            const btn = document.createElement('button')
            btn.type = 'button'
            btn.className = 'mock-btn mock-option'
            btn.appendChild(document.createTextNode(labelText))
            if (showCounts) {
              const countEl = document.createElement('span')
              countEl.className = 'mock-count'
              countEl.textContent = `(${countValue})`
              btn.appendChild(countEl)
            }
            if (isActive) btn.classList.add('active')

            const s = config.styles
            const isTextVariant = config.filterLayout === 'inline' && config.desktopInlineVariant === 'text'

            if (isTextVariant) {
                btn.style.background = 'transparent'
                btn.style.border = 'none'
                btn.style.padding = '0'
                btn.style.color = isActive ? '#000' : '#555'
                btn.style.fontWeight = isActive ? '600' : '400'
                if (isActive) btn.style.textDecoration = 'underline'
            } else if (s.stylePreset === 'underline') {
                btn.style.background = 'transparent'
                btn.style.border = 'none'
                btn.style.borderBottom = `2px solid ${isActive ? s.colorActive.border : 'transparent'}`
                btn.style.borderRadius = 0
                btn.style.color = isActive ? s.colorActive.text : s.colorDefault.text
                btn.style.padding = `${s.paddingVertical}px ${s.paddingHorizontal}px`
            } else {
                Object.assign(btn.style, {
                  borderRadius: `${s.radius}px`,
                  padding: `${s.paddingVertical}px ${s.paddingHorizontal}px`,
                  border: `${s.borderWidth}px solid ${isActive ? s.colorActive.border : s.colorDefault.border}`,
                  background: isActive ? s.colorActive.bg : s.colorDefault.bg,
                  color: isActive ? s.colorActive.text : s.colorDefault.text
                })
            }
            btn.onclick = e => { e.preventDefault(); toggleFilter(key, isAll ? 'ALL_KEY' : opt) }
            el = btn
          }
          return el
        }

        function renderMock() {
          const wrap = document.getElementById('mockWrapper')
          if (!wrap) return

          const prevSearch = document.getElementById('mockSearchInput')
          const wasSearchFocused = prevSearch && document.activeElement === prevSearch
          const selection = wasSearchFocused ? { start: prevSearch.selectionStart, end: prevSearch.selectionEnd } : null

          const isMobilePreview = document.getElementById('previewFrame')?.classList.contains('mobile')
          const mobileDisplayMode = config.mobile?.displayStyle || 'chips'
          const mobileBehavior = config.mobile?.behavior || 'none'
          const effectiveMobileStyle = (mobileBehavior === 'checkbox' || mobileDisplayMode === 'checkbox') ? 'checkbox' : mobileDisplayMode
          const pillStyle = ['pill', 'pills', 'badge', 'badges'].includes((config.tagStyle?.style || 'text').toLowerCase())
          const metaLayout = (config.metaDisplay?.metaLayout || 'stacked-above').toLowerCase()
          const metaLayoutClassName = mapMetaLayoutClass(metaLayout)
          const stickyEnabled = !!config.stickySidebar && config.layout === 'sidebar'
          const sortLabel = (config.textLabels?.sortText || 'Sort By').trim() || 'Sort By'

          wrap.innerHTML = ''
          const mobileClasses = isMobilePreview ? ` mobile-style-${effectiveMobileStyle} mobile-behavior-${mobileBehavior}` : ''
          const inlineVariantClass = (config.filterLayout === 'inline' && config.desktopInlineVariant === 'text') ? ' inline-variant-text' : ''
          wrap.className = `mock-wrapper mock-layout-${config.layout}${mobileClasses}${inlineVariantClass} mock-anim ${config.gridAnimation}${pillStyle ? ' pf-tag-style-pills' : ''}${stickyEnabled ? ' sticky-enabled' : ''}`

          prepareMockWrapper(wrap)

          const speedMap = { slow: '0.8s', normal: '0.5s', fast: '0.3s' }
          wrap.style.setProperty('--mock-anim-duration', speedMap[config.animationSpeed] || '0.5s')
          wrap.style.setProperty('--mock-anim-delay-step', config.animationStagger === false ? '0ms' : '60ms')
          wrap.style.setProperty('--pf-group-gap', `${config.styles.marginBottom || 0}px`)
          wrap.style.setProperty('--pf-sticky-top', `${parseInt(config.stickyTopSpacing, 10) || 0}px`)
          wrap.style.setProperty('--pf-tag-bg', config.tagStyle?.bg || '#f0f0f0')
          wrap.style.setProperty('--pf-tag-text', config.tagStyle?.text || '#333333')
          wrap.style.setProperty('--pf-tag-radius', `${parseInt(config.tagStyle?.radius, 10) || 4}px`)
          wrap.style.setProperty('--pf-tag-border-width', `${parseInt(config.tagStyle?.borderWidth, 10) || 0}px`)
          wrap.style.setProperty('--pf-tag-border-color', config.tagStyle?.borderColor || '#cccccc')
          wrap.style.setProperty('--pf-tag-pad-x', `${parseInt(config.tagStyle?.padX, 10) || 6}px`)
          wrap.style.setProperty('--pf-tag-pad-y', `${parseInt(config.tagStyle?.padY, 10) || 2}px`)
          wrap.style.setProperty('--pf-tag-font-size', isNaN(parseInt(config.tagStyle?.fontSize, 10)) ? '14px' : `${parseInt(config.tagStyle?.fontSize, 10)}px`)
          wrap.style.setProperty('--pf-truncate-font-size', isNaN(parseInt(config.truncateToggle?.fontSize, 10)) ? '14px' : `${parseInt(config.truncateToggle?.fontSize, 10)}px`)
          wrap.style.setProperty('--pf-truncate-text-color', config.truncateToggle?.textColor || '#333')

          const sidebarWidthSetting = clampPercent(config.sidebarWidthPercent ?? 30) ?? 30
          const gridWidthSetting = clampPercent(config.gridWidthPercent ?? 70) ?? 70
          wrap.style.setProperty('--pf-sidebar-width', `${sidebarWidthSetting}%`)
          wrap.style.setProperty('--pf-grid-width', `${gridWidthSetting}%`)
          wrap.classList.toggle('pf-show-meta-labels', !!config.showMetaLabels)
          forceMobileCheckbox = isMobilePreview && (mobileBehavior === 'checkbox' || mobileDisplayMode === 'checkbox')

          /* CONTROLS STRUCTURE */
          const controls = document.createElement('div')
          controls.className = 'mock-controls'

          if (config.layout === 'top') {
              const topRow = document.createElement('div')
              topRow.className = 'mock-controls-top-row'

              const leftCol = document.createElement('div')
              leftCol.className = 'mock-controls-left' + (config.filterLayout === 'inline' ? ' inline-layout' : '')

              const rightCol = document.createElement('div')
              rightCol.className = 'mock-controls-right'

              // Filter Groups -> Left
              let renderIndex = 0
              const appendGroup = node => { if(node){ leftCol.appendChild(node); renderIndex++ } }
              appendGroup(renderFilterGroup(config.textLabels.defaultFilterName, getOptionsFromData('tags'), 'tags', undefined, renderIndex))
              appendGroup(renderFilterGroup('Location', LOCATIONS, 'location', undefined, renderIndex))
              appendGroup(renderFilterGroup('Year', YEARS, 'year', undefined, renderIndex))
              topRow.appendChild(leftCol)

              // Search & Sort -> Right
              if (config.searchEnabled) {
                const s = document.createElement('input')
                s.id = 'mockSearchInput'
                s.placeholder = config.textLabels.searchPlaceholder
                s.value = state.search
                s.oninput = e => { state.search = e.target.value.toLowerCase(); state.page = 1; renderMock() }
                s.onkeydown = e => { if (e.key === 'Enter') e.preventDefault() }
                rightCol.appendChild(s)
                if (wasSearchFocused) {
                  setTimeout(() => { s.focus(); if (selection) s.setSelectionRange(selection.start, selection.end) }, 0)
                }
              }
              if (config.sortEnabled) {
                  const sel = document.createElement('select')
                  sel.className = 'mock-sort-select'
                  let options = `<option value="original">${sortLabel}</option><option value="asc">Name (A-Z)</option><option value="desc">Name (Z-A)</option>`
                  if (config.displayYearInSort) options += `<option value="date-newest">Year (Newest)</option><option value="date-oldest">Year (Oldest)</option>`
                  sel.innerHTML = options
                  if (!config.displayYearInSort && state.sort.startsWith('date')) state.sort = 'original'
                  sel.value = state.sort
                  sel.onchange = e => { state.sort = e.target.value; renderMock() }
                  rightCol.appendChild(sel)
              }
              if (rightCol.children.length > 0) topRow.appendChild(rightCol)
              controls.appendChild(topRow)

              // Reset Row
              if (config.showResetButton) {
                  const resetRow = document.createElement('div')
                  resetRow.className = 'mock-reset-row'
                  const reset = document.createElement('button')
                  reset.className = 'mock-load-btn'
                  reset.textContent = config.textLabels.resetText
                  reset.onclick = () => resetFilters()
                  resetRow.appendChild(reset)
                  controls.appendChild(resetRow)
              }

          } else {
              // Sidebar Layout (Standard Column)
              if (config.searchEnabled) {
                const s = document.createElement('input')
                s.id = 'mockSearchInput'
                s.placeholder = config.textLabels.searchPlaceholder
                s.style.marginBottom = '15px'; s.style.width = '100%'
                s.value = state.search
                s.oninput = e => { state.search = e.target.value.toLowerCase(); state.page = 1; renderMock() }
                controls.appendChild(s)
                if (wasSearchFocused) {
                  setTimeout(() => { s.focus(); if (selection) s.setSelectionRange(selection.start, selection.end) }, 0)
                }
              }
              let renderIndex = 0
              const appendGroup = node => { if(node){ controls.appendChild(node); renderIndex++ } }
              appendGroup(renderFilterGroup(config.textLabels.defaultFilterName, getOptionsFromData('tags'), 'tags', undefined, renderIndex))
              appendGroup(renderFilterGroup('Location', LOCATIONS, 'location', undefined, renderIndex))
              appendGroup(renderFilterGroup('Year', YEARS, 'year', undefined, renderIndex))

              if (config.sortEnabled || config.showResetButton) {
                const sortDiv = document.createElement('div')
                sortDiv.className = 'mock-sort-row'
                if (config.sortEnabled) {
                  const sel = document.createElement('select')
                  sel.className = 'mock-sort-select'
                  let options = `<option value="original">${sortLabel}</option><option value="asc">Name (A-Z)</option><option value="desc">Name (Z-A)</option>`
                  if (config.displayYearInSort) options += `<option value="date-newest">Year (Newest)</option><option value="date-oldest">Year (Oldest)</option>`
                  sel.innerHTML = options
                  sel.value = state.sort
                  sel.onchange = e => { state.sort = e.target.value; renderMock() }
                  sortDiv.appendChild(sel)
                }
                if (config.showResetButton) {
                  const reset = document.createElement('button')
                  reset.className = 'mock-load-btn'; reset.style.marginLeft = config.sortEnabled ? 'auto' : '0'
                  reset.textContent = config.textLabels.resetText
                  reset.onclick = () => resetFilters()
                  sortDiv.appendChild(reset)
                }
                if (sortDiv.children.length) controls.appendChild(sortDiv)
              }
          }

          wrap.appendChild(controls)

          /* CONTENT */
          const contentCol = document.createElement('div')
          contentCol.className = 'mock-content'
          const grid = document.createElement('div')
          grid.className = 'mock-grid'

          const filtered = DATA.filter(item => {
            const selectedTags = Array.isArray(state.filters.tags) ? state.filters.tags : []
            const selectedLoc = Array.isArray(state.filters.location) ? state.filters.location : []
            const selectedYear = Array.isArray(state.filters.year) ? state.filters.year : []
            const tagMatch = !selectedTags.length || (item.tags && selectedTags.some(v => item.tags.includes(v)))
            const locMatch = !selectedLoc.length || selectedLoc.includes(item.location)
            const yearMatch = !selectedYear.length || selectedYear.some(v => String(v) === String(item.year))
            const metaSearch = Object.values(item.meta || {}).map(v => (Array.isArray(v) ? v.join(' ') : v)).join(' ')
            const searchMatch = !state.search || [item.title, (item.tags || []).join(' '), item.location, item.year, item.excerpt, item.author, metaSearch].join(' ').toLowerCase().includes(state.search)
            return tagMatch && locMatch && yearMatch && searchMatch
          })

          if (!config.randomOrder) { previewRandomMap = null; lastRandomEnabled = false; }
          if (config.randomOrder && state.sort === 'original') {
            if (!previewRandomMap || previewRandomMap.size !== DATA.length) {
              previewRandomMap = new Map()
              shuffleArray(DATA.map(d => d.id)).forEach((id, idx) => previewRandomMap.set(id, idx))
            }
            lastRandomEnabled = true
            filtered.sort((a, b) => {
              const aIdx = previewRandomMap?.get(a.id) ?? a.id
              const bIdx = previewRandomMap?.get(b.id) ?? b.id
              return aIdx - bIdx
            })
          }
          if (state.sort === 'asc') filtered.sort((a, b) => a.title.localeCompare(b.title))
          if (state.sort === 'desc') filtered.sort((a, b) => b.title.localeCompare(a.title))
          if (state.sort === 'date-newest') filtered.sort((a, b) => b.year - a.year)
          if (state.sort === 'date-oldest') filtered.sort((a, b) => a.year - b.year)

          const limit = config.pagination.type === 'none' ? filtered.length : state.page * config.pagination.itemsPerPage
          const shown = filtered.slice(0, limit)

          const showCustomMeta = config.metaDisplay.showCustomMeta ?? config.metaDisplay.showCustom
          let customFieldNames = showCustomMeta ? parseCustomFieldList(config.metaDisplay.customMetaFields) : []
          if (showCustomMeta && customFieldNames.length === 0) customFieldNames = ['Author']
          const ensureField = label => { if (!customFieldNames.some(f => f.toLowerCase() === label.toLowerCase())) customFieldNames.push(label) }
          if (showCustomMeta && config.metaDisplay.showLocation) ensureField('Location')
          if (showCustomMeta && config.metaDisplay.showYear) ensureField('Year')

          const delayStep = config.animationStagger === false ? 0 : 60
          const createdItems = []

          shown.forEach((item, idx) => {
            const el = document.createElement('div')
            el.className = 'mock-item'
            el.classList.add(metaLayoutClassName)

            const delay = config.gridAnimation !== 'none' ? idx * delayStep : 0
            el.style.setProperty('--mock-anim-delay', `${delay}ms`)

            const metaPieces = []
            if (config.metaDisplay.showTags && item.tags && item.tags.length) {
              if (pillStyle) {
                item.tags.forEach(t => metaPieces.push(`<span class="mock-meta-item mock-meta-tag">${t}</span>`))
              } else {
                metaPieces.push(`<span class="mock-meta-item mock-meta-tag">${(item.tags || []).join(config.metaDisplay.tagDelimiter || ' ')}</span>`)
              }
            }
            if (config.metaDisplay.showLocation && !showCustomMeta) {
                const labelHTML = config.showMetaLabels ? `<span class="mock-meta-label">Location: </span>` : '';
                metaPieces.push(`<span class="mock-meta-item mock-meta-location">${labelHTML}${item.location}</span>`)
            }
            if (config.metaDisplay.showYear && !showCustomMeta) {
                const labelHTML = config.showMetaLabels ? `<span class="mock-meta-label">Year: </span>` : '';
                metaPieces.push(`<span class="mock-meta-item mock-meta-year">${labelHTML}${item.year}</span>`)
            }
            if (showCustomMeta) {
              customFieldNames.forEach(name => {
                const rawVal = getMetaValue(item, name)
                if (rawVal === undefined || rawVal === null) return
                const delimiter = name.toLowerCase() === 'location' ? ' ' : config.metaDisplay.tagDelimiter || ' '
                const valueText = Array.isArray(rawVal) ? rawVal.join(delimiter) : rawVal
                if (String(valueText).trim() === '') return
                const label = name.trim() || name
                const safeKey = sanitizeKeyForClass(label || 'custom')
                const labelHTML = config.showMetaLabels ? `<span class="custom-tag-${safeKey}">${label}: </span>` : '';
                metaPieces.push(`<div class="custom-tag-${safeKey}-wrapper mock-meta-item mock-meta-custom">${labelHTML}<span class="custom-tag-value">${valueText}</span></div>`)
              })
            }

            const metaWrapperHtml = metaPieces.length ? `<div class="mock-item-meta-wrapper">${metaPieces.join('')}</div>` : ''
            const excerptHtml = config.metaDisplay.showExcerpt ? `<div class="mock-item-excerpt">${item.excerpt}</div>` : ''

            const metaBeforeTitle = metaLayoutClassName === 'meta-layout-stacked-above' || metaLayoutClassName.includes('overlay')
            const titleHtml = `<h4 class="portfolio-title">${item.title}</h4>`
            const combined = metaBeforeTitle ? `${metaWrapperHtml}${titleHtml}` : `${titleHtml}${metaWrapperHtml}`

            el.innerHTML = `
               <div class="mock-item-image-placeholder"></div>
               <div class="mock-item-txt ${metaLayoutClassName}">
                   ${combined}
                   ${excerptHtml}
               </div>`
            grid.appendChild(el)
            createdItems.push(el)
          })

          contentCol.appendChild(grid)
          requestAnimationFrame(() => { replayMockAnimations(grid, createdItems, config.gridAnimation, config.animationStagger) })

          if (!shown.length) {
            const empty = document.createElement('div')
            empty.className = 'mock-empty'
            empty.textContent = config.noResultsText || 'No results found.'
            contentCol.appendChild(empty)
          }

          if (config.pagination.type !== 'none' && shown.length < filtered.length) {
            const pag = document.createElement('div')
            pag.className = 'mock-pagination'
            if (config.pagination.showProgress) {
              pag.innerHTML += `<div class="mock-pag-txt">Showing ${shown.length} of ${filtered.length} Projects</div>`
            }
            const btn = document.createElement('button')
            btn.className = 'mock-load-btn'
            btn.textContent = config.pagination.loadMoreLabel
            btn.onclick = () => { state.page++; renderMock() }
            pag.appendChild(btn)
            contentCol.appendChild(pag)
          }
          wrap.appendChild(contentCol)
        }

        /* --- UPDATE & INIT --- */
        function updateAll() {
          try {
            // Mobile Style Helper Logic
            const mobileStyle = document.getElementById('mobileDisplayStyle').value
            const mobileHelper = document.getElementById('mobileHelperText')
            if (mobileHelper) {
                const map = { chips: 'Best space saver.', wrap: 'Shows all tags.', accordion: 'Expandable list.', checkbox: 'Good for many items.' }
                mobileHelper.textContent = map[mobileStyle] || ''
            }

            // Motion UI Logic
            const gridAnim = document.getElementById('gridAnimation')?.value || 'fade-up'
            const showMotionControls = gridAnim !== 'none'
            if (document.getElementById('animSpeedRow')) document.getElementById('animSpeedRow').style.display = showMotionControls ? 'block' : 'none'
            if (document.getElementById('animStaggerRow')) document.getElementById('animStaggerRow').style.display = showMotionControls ? 'flex' : 'none'

            // Mobile Logic
            let mobileDisplayStyle = 'wrap'
            let mobileBehavior = 'none'
            if (mobileStyle === 'wrap') mobileDisplayStyle = 'wrap'
            else if (mobileStyle === 'checkbox') { mobileDisplayStyle = 'checkbox'; mobileBehavior = 'checkbox' }
            else if (mobileStyle === 'accordion') { mobileDisplayStyle = 'wrap'; mobileBehavior = 'accordion' }

            // Filter Layout Logic
            const filterLayoutValue = document.getElementById('filterLayout').value
            const inlineVariantValue = document.getElementById('desktopInlineVariant').value || 'buttons'
            const isInlineLayout = filterLayoutValue === 'inline'

            const showFilterLabelToggle = document.getElementById('showFilterLabel')
            if (document.getElementById('showFilterLabelRow')) document.getElementById('showFilterLabelRow').style.display = isInlineLayout ? 'flex' : 'none'
            if (showFilterLabelToggle) showFilterLabelToggle.disabled = !isInlineLayout
            const effectiveShowLabel = isInlineLayout ? (showFilterLabelToggle?.checked ?? true) : true

            // Custom Meta Logic
            const customToggle = document.getElementById('m_cust')
            if (document.getElementById('customMetaRow')) document.getElementById('customMetaRow').style.display = customToggle?.checked ? 'block' : 'none'

            // Tag Pills Logic
            const tagStyleVal = document.getElementById('tagStyle')?.value || 'text'
            const showPillControls = ['pill', 'pills', 'badge', 'badges'].includes(tagStyleVal)
            if (document.getElementById('tagPillSettings')) document.getElementById('tagPillSettings').style.display = showPillControls ? 'block' : 'none'

            // Sticky & Width Logic
            const isSidebar = document.getElementById('layout').value === 'sidebar'
            if (document.getElementById('stickyRow')) document.getElementById('stickyRow').style.display = isSidebar ? 'flex' : 'none'
            if (document.getElementById('stickySpacingRow')) document.getElementById('stickySpacingRow').style.display = (isSidebar && document.getElementById('stickySidebar').checked) ? 'block' : 'none'
            if (document.getElementById('sidebarWidthRow')) document.getElementById('sidebarWidthRow').style.display = isSidebar ? 'flex' : 'none'
            if (document.getElementById('gridWidthRow')) document.getElementById('gridWidthRow').style.display = isSidebar ? 'flex' : 'none'

            // Truncate Logic
            if (document.getElementById('truncateSettings')) document.getElementById('truncateSettings').style.display = document.getElementById('truncateFilters').checked ? 'block' : 'none'

            // Delimiter Logic
            const tagDelimiterMode = document.getElementById('tagDelimiterMode').value
            if (document.getElementById('tagDelimiterCustom')) document.getElementById('tagDelimiterCustom').style.display = tagDelimiterMode === 'custom' ? 'block' : 'none'

            const safeInt = (id, def) => parseInt(document.getElementById(id)?.value, 10) || def
            // For CSS number strings in JSON as requested
            const safeStr = (id, def) => String(parseInt(document.getElementById(id)?.value, 10) || def)
            const safeClamp = (val, def) => { const n = Number(val); return (isNaN(n) ? def : Math.min(90, Math.max(10, n))); }

            config = {
              layout: document.getElementById('layout').value,
              filterLayout: filterLayoutValue,
              searchEnabled: document.getElementById('searchEnabled').checked,
              sortEnabled: document.getElementById('sortEnabled').checked,
              displayYearInSort: document.getElementById('displayYearInSort').checked,
              showResetButton: document.getElementById('showResetButton').checked,
              defaultSortOrder: document.getElementById('defaultSortOrder').value,
              multipleFilterGroups: document.getElementById('multipleFilterGroups').checked,
              hideSingleValueFilters: document.getElementById('hideSingleValueFilters').checked,
              showFilterLabel: effectiveShowLabel,
              allowMultiSelect: document.getElementById('allowMultiSelect').checked,
              showItemCounts: document.getElementById('showItemCounts').checked,
              desktopInlineVariant: inlineVariantValue,
              noResultsText: document.getElementById('noResultsText').value,
              randomOrder: document.getElementById('randomOrder').checked,
              stickySidebar: document.getElementById('stickySidebar').checked,
              stickyTopSpacing: safeInt('stickyTopSpacing', 20),
              truncateFilters: document.getElementById('truncateFilters').checked,
              truncateMax: safeInt('truncateMax', 5),
              truncateToggle: {
                fontSize: safeInt('truncateToggleFontSize', 14),
                textColor: document.getElementById('truncateToggleColor').value
              },
              textLabels: {
                allText: document.getElementById('allText').value,
                resetText: document.getElementById('resetText').value,
                searchPlaceholder: document.getElementById('searchPlaceholder').value,
                sortText: document.getElementById('sortText').value,
                defaultFilterName: document.getElementById('defaultFilterName').value,
                showMore: document.getElementById('showMoreLabel').value,
                showLess: document.getElementById('showLessLabel').value
              },
              pagination: {
                type: document.getElementById('pagType').value === 'infinite' ? 'none' : document.getElementById('pagType').value,
                itemsPerPage: safeInt('itemsPerPage', 12),
                loadMoreLabel: document.getElementById('loadMoreLabel').value,
                showProgress: document.getElementById('showProgress').checked
              },
              styles: {
                stylePreset: document.getElementById('stylePreset').value,
                align: document.getElementById('align').value,
                gap: safeStr('gap', 10),
                marginBottom: safeStr('marginBottom', 30),
                radius: safeStr('radius', 4),
                paddingVertical: safeStr('padV', 8),
                paddingHorizontal: safeStr('padH', 16),
                borderWidth: safeStr('borderWidth', 1),
                colorDefault: { bg: document.getElementById('c_bg_def').value, text: document.getElementById('c_txt_def').value, border: document.getElementById('c_bor_def').value },
                colorActive: { bg: document.getElementById('c_bg_act').value, text: document.getElementById('c_txt_act').value, border: document.getElementById('c_bor_act').value }
              },
              tagStyle: {
                style: document.getElementById('tagStyle').value.toLowerCase(),
                bg: document.getElementById('tagBgColor').value,
                text: document.getElementById('tagTextColor').value,
                radius: safeInt('tagRadius', 4),
                borderColor: document.getElementById('tagBorderColor').value,
                borderWidth: safeInt('tagBorderWidth', 0),
                padX: safeInt('tagPadX', 6),
                padY: safeInt('tagPadY', 2),
                fontSize: safeInt('tagFontSize', 14)
              },
              metaDisplay: {
                showTags: document.getElementById('m_tags').checked,
                tagDelimiter: resolveTagDelimiter(tagDelimiterMode, document.getElementById('tagDelimiterCustom').value),
                tagDelimiterMode: tagDelimiterMode,
                tagDelimiterCustom: document.getElementById('tagDelimiterCustom').value,
                metaLayout: document.getElementById('metaLayout').value.toLowerCase(),
                showYear: document.getElementById('m_year').checked,
                showLocation: document.getElementById('m_loc').checked,
                showExcerpt: document.getElementById('m_exc').checked,
                showCustomMeta: document.getElementById('m_cust').checked,
                customMetaFields: document.getElementById('customMetaFields').value,
                showCustom: document.getElementById('m_cust').checked
              },
              showMetaLabels: document.getElementById('showMetaLabels').checked,
              sidebarWidthPercent: safeClamp(document.getElementById('sidebarWidthPercent').value, 30),
              gridWidthPercent: safeClamp(document.getElementById('gridWidthPercent').value, 70),
              mobile: {
                displayStyle: mobileDisplayStyle,
                behavior: mobileBehavior
              },
              gridAnimation: gridAnim,
              animationSpeed: document.getElementById('animationSpeed').value,
              animationStagger: document.getElementById('animationStagger').checked
            }

            if (!sortInitialized) { state.sort = config.defaultSortOrder || 'original'; sortInitialized = true; }
            // If sort changed via settings, update state
            if (state.sort !== config.defaultSortOrder) {
                // If user hasn't manually interacted, sync.
                // Since this is a config generator, mostly we want WYSIWYG
                state.sort = config.defaultSortOrder
            }

            if (lastLayout !== config.layout || lastFilterLayout !== config.filterLayout || lastMobileBehavior !== config.mobile.behavior) {
                groupOpenState = {}
            }
            lastLayout = config.layout; lastFilterLayout = config.filterLayout; lastMobileBehavior = config.mobile.behavior; lastMobileDisplayStyle = mobileStyle;

            renderMock()
            generateCode()
          } catch (e) {
            console.error('Update Error:', e)
            document.getElementById('codeOutput').textContent = 'Error: ' + e.message
          }
        }

        function generateCode() {
          const cfg = {
            layout: config.layout,
            filterLayout: config.filterLayout,
            searchEnabled: config.searchEnabled,
            sortEnabled: config.sortEnabled,
            displayYearInSort: config.displayYearInSort,
            showResetButton: config.showResetButton,
            defaultSortOrder: config.defaultSortOrder,
            multipleFilterGroups: config.multipleFilterGroups,
            hideSingleValueFilters: config.hideSingleValueFilters,
            showFilterLabel: config.showFilterLabel,
            allowMultiSelect: config.allowMultiSelect,
            showItemCounts: config.showItemCounts,
            desktopInlineVariant: config.desktopInlineVariant,
            noResultsText: config.noResultsText,
            randomOrder: config.randomOrder,
            stickySidebar: config.stickySidebar,
            stickyTopSpacing: config.stickyTopSpacing,
            truncateFilters: config.truncateFilters,
            truncateMax: config.truncateMax,
            truncateToggle: config.truncateToggle,
            textLabels: config.textLabels,
            pagination: config.pagination,
            styles: config.styles,
            tagStyle: config.tagStyle,
            metaDisplay: config.metaDisplay,
            showMetaLabels: config.showMetaLabels,
            sidebarWidthPercent: config.sidebarWidthPercent,
            gridWidthPercent: config.gridWidthPercent,
            mobile: config.mobile,
            gridAnimation: config.gridAnimation,
            animationSpeed: config.animationSpeed,
            animationStagger: config.animationStagger
          }
          const js = `\n<style>#gridThumbs{opacity:0;transition:opacity 0.2s ease;}</style>\n<link rel="stylesheet" href="portfolio-filter-v2.css">\n<script>\nwindow.PORTFOLIO_CONFIG = ${JSON.stringify(cfg, null, 4)};\n<\/script>\n<script src="portfolio-filter-v2.js" defer><\/script>`
          document.getElementById('codeOutput').textContent = js
        }

        function initDesktopStyleSelect() {
          const layoutInput = document.getElementById('filterLayout')
          const variantInput = document.getElementById('desktopInlineVariant')
          const select = document.getElementById('desktopStyleSelect')
          const helper = document.getElementById('desktopStyleHelper')
          const helperCopy = {
            buttons: 'Solid clickable pills.',
            text: 'Simple text links.',
            dropdown: 'Space-saving dropdowns.',
            checkbox: 'Standard checkboxes.'
          }
          if (!select) return
          const apply = (val, shouldUpdate = true) => {
            if (val === 'dropdown') { layoutInput.value = 'dropdown'; variantInput.value = 'buttons' }
            else if (val === 'checkbox') { layoutInput.value = 'checkbox'; variantInput.value = 'buttons' }
            else { layoutInput.value = 'inline'; variantInput.value = val === 'text' ? 'text' : 'buttons' }
            if (helper) helper.textContent = helperCopy[val]
            if (shouldUpdate) updateAll()
          }
          select.addEventListener('change', e => apply(e.target.value))

          let initial = 'buttons'
          if (layoutInput.value === 'dropdown') initial = 'dropdown'
          else if (layoutInput.value === 'checkbox') initial = 'checkbox'
          else if (layoutInput.value === 'inline' && variantInput.value === 'text') initial = 'text'
          select.value = initial
          apply(initial, false)
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', updateAll))

        window.setTab = function(t) {
          document.body.className = 'tab-' + t
          document.querySelectorAll('.tab-btn').forEach(function(btn) {
            const isActive = btn.getAttribute('onclick') === "setTab('" + t + "')"
            btn.classList.toggle('active', isActive)
          })
        }
        window.setDev = function(d) {
            document.getElementById('previewFrame').className = d
            document.querySelectorAll('.device-toggle button').forEach(b => b.classList.remove('active'))
            document.getElementById(d + 'Toggle').classList.add('active')
            groupOpenState = {}
            renderMock()
        }
        window.togGroup = function(h) { h.parentNode.classList.toggle('open') }
        window.copyCode = function() {
            navigator.clipboard.writeText(document.getElementById('codeOutput').textContent)
            const copiedHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Copied!
            `
            ;['copyBtn', 'mobileCopyBtn'].forEach(function(id) {
                const btn = document.getElementById(id)
                if (!btn) return
                const original = btn.innerHTML
                btn.innerHTML = copiedHTML
                btn.classList.add('copied')
                setTimeout(function() { btn.innerHTML = original; btn.classList.remove('copied') }, 2000)
            })
        }

        initDesktopStyleSelect()
        updateAll()

      } catch (err) {
        document.body.innerHTML = '<h1>Error</h1><p>' + err.message + '</p>'
      }
    </script>
</body>
</html>
